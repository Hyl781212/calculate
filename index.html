<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传染病消毒剂配制计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft Yahei", 微软雅黑;
            max-width: 480px;
            margin: 30px auto;
            padding: 25px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 10px;
            box-shadow: 3px 3px 12px rgba(0,0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: 22px;
            margin-bottom: 8px;
            margin-top: 0;
        }
        .drug-name{
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 22px;
        }
        .row-item{
            display: flex;
            margin: 12px 0;
            align-items: center;
        }
        .title-label {
            color: #005a9c;
            font-weight: bold;
            font-size: 16px;
            width: 85px;
            white-space: nowrap;
        }
        label {
            display: inline-block;
            color: #333;
            font-weight: 500;
            white-space: nowrap;
        }
        select, input {
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #b8c8dc;
            outline: none;
        }
        #disinfectObj {
            width: 135px; /* 加宽，完整显示“清洁用品(L)” */
            margin-right: 8px;
        }
        #inputVal{
            width: 160px;
        }
        #len {
            width: 105px;
            margin-right: 8px;
        }
        #wid{
            width: 105px;
        }
        #wallType {
            width: 105px;
            margin-right: 8px;
        }
        #wallDose {
            width: 105px;
        }
        #origConc{
            width: 55px;
        }
        #targetEnv{
            width: 100px;
        }
        .btn-row{
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .btn-row button{
            flex:1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 17px;
            cursor: pointer;
            font-weight: 500;
        }
        #calcBtn {
            background: #005a9c;
            color: #fff;
        }
        #resetBtn {
            background: #dc3545;
            color: #fff;
        }
        #convertBtn {
            background: #28a745;
            color: #fff;
        }
        input:focus, select:focus {
            border-color: #005a9c;
        }
        .res {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafe;
            border-radius: 8px;
            font-size: 16px;
            line-height: 2;
        }
        .res p {
            margin: 8px 0;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .blue-title{
            color: #005a9c;
            font-weight: bold;
        }
        .bottom-info{
            margin-top: 25px;
            text-align: center;
            color: #668cb3;
            font-size: 14px;
            font-weight: normal;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <h3>传染病消毒剂配制计算器</h3>
    <div class="drug-name">消毒剂名称：次氯酸钠（俗称84）</div>

    <div class="row-item">
        <div class="title-label">消毒对象：</div>
        <select id="disinfectObj">
            <option value="sputum">痰液(ml)</option>
            <option value="fabricWater">物表(L)</option>
            <option value="tablewareWater">餐具(L)</option>
            <option value="cleanWater">清洁用品(L)</option>
            <option value="rubWater">垃圾(L)</option>
            <option value="vomit">呕吐物(ml)</option>
            <option value="feces">大便(ml)</option>
            <option value="urine">小便(ml)</option>
            <option value="sewage">生活污水(L)</option>
            <option value="bodyWater">遗体(L)</option>
        </select>
        <input type="number" id="inputVal" placeholder="请先选择消毒对象">
    </div>

    <div class="row-item">
        <div class="title-label">室内消毒：</div>
        <label>长度</label>
        <input type="number" id="len" placeholder="输入米">
        <label>；宽度</label>
        <input type="number" id="wid" placeholder="输入米">
    </div>
    <div class="row-item">
        <label style="width:85px;"></label>
        <label>墙面</label>
        <select id="wallType">
            <option value="none">不消毒</option>
            <option value="soil">泥土</option>
            <option value="other">其他</option>
        </select>
        <label>，用量</label>
        <input type="text" id="wallDose">
    </div>
    <div class="row-item">
        <label>原液浓度(%)</label>
        <input type="number" id="origConc" value="5" min="0.1" step="0.1">
        <label>；目标浓度(mg/L)</label>
        <input type="number" id="targetEnv" value="1000" min="100" max="99999">
    </div>

    <div class="btn-row">
        <button id="calcBtn" onclick="calcAll()">计算</button>
        <button id="resetBtn" onclick="resetAll()">重置</button>
        <button id="convertBtn">ml/L转换</button>
    </div>

    <div class="res" id="result"></div>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let useAutoUnit = true;
let cacheStock = 0, cacheWater = 0;
let cacheSputumStock = 0, cacheSputumWater = 0;
let cacheFabricStock = 0, cacheFabricWater = 0;
let cacheTableStock = 0, cacheTableWater = 0;

document.getElementById('convertBtn').addEventListener('click', function () {
    useAutoUnit = !useAutoUnit;
    renderAllResult();
});

document.getElementById('wallType').addEventListener('change', function () {
    const val = this.value;
    const doseInput = document.getElementById('wallDose');
    if (val === 'none') doseInput.value = '';
    else if (val === 'soil') doseInput.value = '150ml/m²';
    else doseInput.value = '100ml/m²';
});
document.getElementById('wallType').dispatchEvent(new Event('change'));

document.getElementById('disinfectObj').addEventListener('change', function () {
    const val = this.value;
    const input = document.getElementById('inputVal');
    switch (val) {
        case 'sputum': input.placeholder = "输入痰液量"; break;
        case 'vomit': input.placeholder = "输入呕吐物量"; break;
        case 'feces': input.placeholder = "输入大便量"; break;
        case 'urine': input.placeholder = "输入小便量"; break;
        case 'sewage': input.placeholder = "输入污水量"; break;
        default: input.placeholder = "输入消毒液量";
    }
});
document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

function getUnitText(num) {
    num = parseFloat(num) || 0;
    if (useAutoUnit) {
        return num >= 1000 ? [(num / 1000).toFixed(1), 'L'] : [num.toFixed(1), 'ml'];
    } else {
        return num >= 1000 ? [num.toFixed(1), 'ml'] : [(num / 1000).toFixed(1), 'L'];
    }
}

function renderAllResult() {
    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;

    const groundArea = L * W;
    const wallArea = wallType !== 'none' ? 2 * (L + W) * 2 : 0;
    const totalArea = groundArea + wallArea;

    let html = "";

    if (obj === 'sputum' && val > 0) {
        const s = getUnitText(cacheSputumStock);
        const w = getUnitText(cacheSputumWater);
        html += `<p><span class="blue-title">【痰液消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；浸泡静置，作用时间2小时</p>`;
    }
    if (obj === 'fabricWater' && val > 0) {
        const s = getUnitText(cacheFabricStock);
        const w = getUnitText(cacheFabricWater);
        html += `<p><span class="blue-title">【物表消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；擦拭/喷洒，作用时间30分钟</p>`;
    }
    if (obj === 'tablewareWater' && val > 0) {
        const s = getUnitText(cacheTableStock);
        const w = getUnitText(cacheTableWater);
        html += `<p><span class="blue-title">【餐具消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；浸泡，作用时间30分钟</p>`;
    }
    if (totalArea > 0) {
        const s = getUnitText(cacheStock);
        const w = getUnitText(cacheWater);
        html += `<p><span class="blue-title">【室内消杀】</span>地面${groundArea.toFixed(1)}㎡`;
        if (wallType !== 'none') {
            html += `，墙面${wallArea.toFixed(1)}㎡，总面积${totalArea.toFixed(1)}㎡`;
        }
        html += `<br>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；滞留喷洒，作用时间60分钟</p>`;
    }

    document.getElementById('result').innerHTML = html;
}

function calcAll() {
    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;

    const wallH = wallType !== 'none' ? 2 : 0;
    const wallDoseText = document.getElementById('wallDose').value;
    const wallDosePer = parseFloat(wallDoseText.replace(/[^0-9.]/g, '')) || 100;
    const groundDosePer = (obj === 'sputum' && val > 0) ? 300 : 100;

    const origPct = parseFloat(document.getElementById('origConc').value) || 5;
    const targetEnv = parseFloat(document.getElementById('targetEnv').value) || 1000;
    const origMgL = origPct * 10000;

    cacheSputumStock = 0; cacheSputumWater = 0;
    if (obj === 'sputum' && val > 0) {
        const spuTotalMl = val * 2;
        cacheSputumStock = origMgL === 0 ? 0 : (20000 * spuTotalMl) / origMgL;
        cacheSputumWater = spuTotalMl - cacheSputumStock;
    }
    cacheFabricStock = 0; cacheFabricWater = 0;
    if (obj === 'fabricWater' && val > 0) {
        const totalMl = val * 1000;
        cacheFabricStock = origMgL === 0 ? 0 : (1000 * totalMl) / origMgL;
        cacheFabricWater = totalMl - cacheFabricStock;
    }
    cacheTableStock = 0; cacheTableWater = 0;
    if (obj === 'tablewareWater' && val > 0) {
        const totalMl = val * 1000;
        cacheTableStock = origMgL === 0 ? 0 : (500 * totalMl) / origMgL;
        cacheTableWater = totalMl - cacheTableStock;
    }
    cacheStock = 0; cacheWater = 0;
    const groundArea = L * W;
    const wallArea = wallH ? 2 * (L + W) * wallH : 0;
    const totalMl = groundArea * groundDosePer + wallArea * wallDosePer;
    if (totalMl > 0) {
        cacheStock = (totalMl * targetEnv) / origMgL;
        cacheWater = totalMl - cacheStock;
    }

    renderAllResult();
}

function resetAll() {
    document.getElementById('inputVal').value = '';
    document.getElementById('len').value = '';
    document.getElementById('wid').value = '';
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 1000;
    document.getElementById('wallType').value = 'none';
    document.getElementById('wallType').dispatchEvent(new Event('change'));
    document.getElementById('result').innerHTML = '';
    document.getElementById('disinfectObj').value = 'sputum';
    document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

    cacheStock = cacheWater = 0;
    cacheSputumStock = cacheSputumWater = 0;
    cacheFabricStock = cacheFabricWater = 0;
    cacheTableStock = cacheTableWater = 0;
}
</script>
</body>
</html>
