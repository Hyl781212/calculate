<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>84消毒液配比计算器</title>
    <style>
        body {
            font-family: "Microsoft Yahei",微软雅黑;
            max-width: 480px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: 20px;
            margin-bottom: 25px;
            margin-top:0;
        }
        .row-item{
            display:flex;
            gap:15px;
            margin:14px 0;
        }
        .item {
            margin: 14px 0;
        }
        label {
            display:inline-block;
            width: 160px;
            color: #333;
            font-weight: 500;
        }
        .row-item label{
            width:110px;
        }
        input {
            width: 200px;
            padding: 9px 10px;
            font-size: 16px;
            border: 1px solid #b8c8dc;
            border-radius: 4px;
            outline: none;
        }
        .row-item input{
            width:130px;
        }
        .btn-group{
            margin:14px 0;
            text-align: center;
        }
        .type-btn{
            padding:8px 16px;
            border:none;
            border-radius:4px;
            font-size:15px;
            cursor:pointer;
            margin:0 8px;
        }
        .type-btn.active{
            background:#005a9c;
            color:#fff;
        }
        .type-btn.normal{
            background:#e8edf5;
            color:#333;
        }
        .unit-btn{
            padding:6px 14px;
            border:none;
            border-radius:3px;
            cursor:pointer;
            margin:0 5px;
        }
        .unit-active{
            background:#005a9c;
            color:#fff;
        }
        #calcBtn {
            width: 100%;
            padding: 11px;
            background: #005a9c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            cursor: pointer;
            margin: 15px 0;
        }
        #resetBtn {
            width: 100%;
            padding: 11px;
            background: #dc3545;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            cursor: pointer;
            margin: 15px 0;
        }
        .res {
            margin-top: 15px;
            padding: 20px;
            background: #f7fafe;
            border-radius: 6px;
            font-size: 18px;
            line-height: 2.2;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .split{
            margin:20px 0;height:1px;background:#ccc;
        }
        .bottom-info{
            margin-top: 30px;
            text-align: center;
            color: #005a9c;
            font-size: 16px;
            font-weight: bold;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
        hr {
            border: none;
            height: 1px;
            background-color: #dce4ee;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h3>84消毒液配比计算器</h3>

    <div class="btn-group">
        <button class="type-btn active" id="btn2" onclick="setType(2)">预防性消毒</button>
        <button class="type-btn normal" id="btn1" onclick="setType(1)">疫源地消毒</button>
    </div>

    <div class="row-item">
        <div>
            <label>痰液(ml)：</label>
            <input type="number" id="sputum" placeholder="输入痰液量" oninput="autoSetDose()">
        </div>
        <div>
            <label>清洁用品(ml)：</label>
            <input type="number" id="cleanWater" placeholder="输入消毒液总量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>垃圾(ml)：</label>
            <input type="number" id="rubWater" placeholder="输入消毒液总量">
        </div>
        <div>
            <label>呕吐物(ml)：</label>
            <input type="number" id="vomit" placeholder="输入呕吐物的量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>大便(ml)：</label>
            <input type="number" id="feces" placeholder="输入大便量">
        </div>
        <div>
            <label>小便(ml)：</label>
            <input type="number" id="urine" placeholder="输入小便量">
        </div>
    </div>

    <div class="split"></div>

    <div class="item">
        <label>长度(米)：</label>
        <input type="number" id="len" placeholder="输入长度">
    </div>
    <div class="item">
        <label>宽度(米)：</label>
        <input type="number" id="wid" placeholder="输入宽度">
    </div>
    <div class="item">
        <label>墙面高度(米)：</label>
        <input type="number" id="height" placeholder="输入层高">
    </div>
    <div class="item">
        <label>消杀用量(ml/㎡)：</label>
        <input type="number" id="dose" value="200">
    </div>
    <div class="item">
        <label>84原液浓度(%)：</label>
        <input type="number" id="origConc" value="5">
    </div>
    <div class="item">
        <label>目标浓度(mg/L)：</label>
        <input type="number" id="targetEnv" value="500">
    </div>

    <button id="calcBtn" onclick="calcAll()">立即计算</button>

    <div class="res" id="result"></div>

    <div class="btn-group">
        <button class="unit-btn unit-active" id="unitML" onclick="setUnit('ml')">毫升(ml)</button>
        <button class="unit-btn" id="unitL" onclick="setUnit('L')">升(L)</button>
    </div>
    <button id="resetBtn" onclick="resetAll()">清空重置</button>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let nowUnit = "ml";

function setUnit(u){
    nowUnit = u;
    let mlBtn = document.getElementById('unitML');
    let lBtn = document.getElementById('unitL');
    if(u === 'ml'){
        mlBtn.className = "unit-btn unit-active";
        lBtn.className = "unit-btn";
    }else{
        mlBtn.className = "unit-btn";
        lBtn.className = "unit-btn unit-active";
    }
    calcAll();
}

function autoSetDose(){
    let val = parseFloat(document.getElementById('sputum').value) || 0;
    document.getElementById('dose').value = val > 0 ? 300 : 200;
}

function setType(t){
    let b1=document.getElementById('btn1');
    let b2=document.getElementById('btn2');
    if(t===1){
        b1.className="type-btn active";
        b2.className="type-btn normal";
        document.getElementById('targetEnv').value=1000;
    }else{
        b1.className="type-btn normal";
        b2.className="type-btn active";
        document.getElementById('targetEnv').value=500;
    }
    calcAll();
}

function formatNum(num){
    num = isNaN(num) ? 0 : num;
    if(nowUnit === "ml"){
        return num.toFixed(1) + " ml";
    }else{
        return (num / 1000).toFixed(3) + " L";
    }
}

function resetAll(){
    document.getElementById('sputum').value = '';
    document.getElementById('cleanWater').value = '';
    document.getElementById('rubWater').value = '';
    document.getElementById('vomit').value = '';
    document.getElementById('feces').value = '';
    document.getElementById('urine').value = '';
    document.getElementById('len').value = '';
    document.getElementById('wid').value = '';
    document.getElementById('height').value = '';
    document.getElementById('dose').value = 200;
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 500;
    document.getElementById('result').innerHTML = '';
    setType(2);
    setUnit('ml');
}

function calcAll(){
    let sputumMl = parseFloat(document.getElementById('sputum').value) || 0;
    let cleanWaterMl = parseFloat(document.getElementById('cleanWater').value) || 0;
    let rubWaterMl = parseFloat(document.getElementById('rubWater').value) || 0;
    let vomitMl = parseFloat(document.getElementById('vomit').value) || 0;
    let fecesMl = parseFloat(document.getElementById('feces').value) || 0;
    let urineMl = parseFloat(document.getElementById('urine').value) || 0;
    let L = parseFloat(document.getElementById('len').value) || 0;
    let W = parseFloat(document.getElementById('wid').value) || 0;
    let H = parseFloat(document.getElementById('height').value) || 0;
    let perMl = parseFloat(document.getElementById('dose').value) || 200;
    let origPct = parseFloat(document.getElementById('origConc').value) || 5;
    let targetEnv = parseFloat(document.getElementById('targetEnv').value) || 500;

    const targetSputum = 20000;
    const targetClean = 1000;    // 清洁用品浓度1000mg/L
    const targetRubbish = 10000;
    const targetVomit = 10000;
    const targetFeces = 30000;
    const targetUrine = 10000;
    let origMgL = origPct * 10000;

    let floorArea = L * W;
    let wallArea = 2 * (L + W) * H;
    let totalArea = floorArea + wallArea;
    let envTotalMl = totalArea * perMl;
    
    let envStock = (targetEnv * envTotalMl) / origMgL;
    let envWater = envTotalMl - envStock;

    let cleanStock = (targetClean * cleanWaterMl) / origMgL;
    let cleanNeedWater = cleanWaterMl - cleanStock;

    let rubStock = (targetRubbish * rubWaterMl) / origMgL;
    let rubNeedWater = rubWaterMl - rubStock;

    let html = "";

    if(sputumMl > 0){
        let spuTotalMl = sputumMl * 2;
        let spuStock = (targetSputum * spuTotalMl) / origMgL;
        let spuWater = spuTotalMl - spuStock;
        html += `<p>【痰液消毒配比】原液：<strong>${formatNum(spuStock)}</strong>；加水：<strong>${formatNum(spuWater)}</strong></p>`;
    }

    if(cleanWaterMl > 0){
        html += `<p>【清洁用品消毒配比】原液：<strong>${formatNum(cleanStock)}</strong>；加水：<strong>${formatNum(cleanNeedWater)}</strong></p>`;
    }

    if(rubWaterMl > 0){
        html += `<p>【垃圾消毒配比】原液：<strong>${formatNum(rubStock)}</strong>；加水：<strong>${formatNum(rubNeedWater)}</strong></p>`;
    }

    if(vomitMl > 0){
        let vomitTotal = vomitMl * 1;
        let vomitStock = (targetVomit * vomitTotal) / origMgL;
        let vomitWater = vomitTotal - vomitStock;
        html += `<p>【呕吐物消毒配比】原液：<strong>${formatNum(vomitStock)}</strong>；加水：<strong>${formatNum(vomitWater)}</strong></p>`;
    }

    if(fecesMl > 0){
        let fecesTotal = fecesMl * 5;
        let fecesStock = (targetFeces * fecesTotal) / origMgL;
        let fecesWater = fecesTotal - fecesStock;
        html += `<p>【大便消毒配比】原液：<strong>${formatNum(fecesStock)}</strong>；加水：<strong>${formatNum(fecesWater)}</strong></p>`;
    }

    if(urineMl > 0){
        let urineTotal = urineMl * 10;
        let urineStock = (targetUrine * urineTotal) / origMgL;
        let urineWater = urineTotal - urineStock;
        html += `<p>【小便消毒配比】原液：<strong>${formatNum(urineStock)}</strong>；加水：<strong>${formatNum(urineWater)}</strong></p>`;
    }

    html += `<p>【环境消杀配比】总面积：${totalArea.toFixed(2)}㎡，原液：<strong>${formatNum(envStock)}</strong>；加水：<strong>${formatNum(envWater)}</strong></p>`;

    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
