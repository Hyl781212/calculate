<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传染病消毒剂配制计算器</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", 微软雅黑;
            max-width: 480px;
            margin: 30px auto;
            padding: 25px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: 22px;
            margin-bottom: 8px;
            margin-top: 0;
        }
        .drug-name{
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 22px;
        }
        .split-wrap{
            position: relative;
            margin: 25px 0;
        }
        .split{
            height: 2px;
            background: #005a9c;
            width: 100%;
        }
        .surface-title{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
            background: #fff;
            padding: 0 15px;
            font-size: 16px;
            color: #005a9c;
            font-weight: bold;
        }
        .row-item{
            display: flex;
            gap: 12px;
            margin: 12px 0;
            align-items: center;
        }
        .item {
            margin: 12px 0;
        }
        label {
            display: inline-block;
            width: 160px;
            color: #333;
            font-weight: 500;
        }
        .row-item label{
            width: 110px;
            flex-shrink: 0;
        }
        input {
            width: 200px;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #b8c8dc;
            border-radius: 5px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #005a9c;
        }
        .row-item input{
            width: 130px;
        }
        .calc-row{
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        #calcBtn, #resetBtn, #unitSwitchBtn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 17px;
            cursor: pointer;
            font-weight: 500;
        }
        #calcBtn {
            background: #005a9c;
            color: #fff;
        }
        #resetBtn {
            background: #dc3545;
            color: #fff;
        }
        #unitSwitchBtn{
            background: #28a745;
            color: #fff;
        }
        .res {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafe;
            border-radius: 8px;
            font-size: 16px;
            line-height: 2;
        }
        .res p {
            margin: 8px 0;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .blue-title{
            color: #005a9c;
            font-weight: bold;
        }
        .bottom-info{
            margin-top: 25px;
            text-align: center;
            color: #005a9c;
            font-size: 15px;
            font-weight: bold;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <h3>传染病消毒剂配制计算器</h3>
    <div class="drug-name">消毒剂名称：次氯酸钠（俗称84）</div>

    <div class="row-item">
        <div>
            <label>痰液(ml)：</label>
            <input type="number" id="sputum" placeholder="输入痰液量" oninput="autoSetDose()">
        </div>
        <div>
            <label>清洁用品(L)：</label>
            <input type="number" id="cleanWater" placeholder="输入消毒液量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>垃圾(L)：</label>
            <input type="number" id="rubWater" placeholder="输入消毒液量">
        </div>
        <div>
            <label>呕吐物(ml)：</label>
            <input type="number" id="vomit" placeholder="输入呕吐物量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>大便(ml)：</label>
            <input type="number" id="feces" placeholder="输入大便量">
        </div>
        <div>
            <label>小便(ml)：</label>
            <input type="number" id="urine" placeholder="输入小便量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>污水(L)：</label>
            <input type="number" id="sewage" placeholder="输入污水量">
        </div>
        <div>
            <label>织物(L)：</label>
            <input type="number" id="fabricWater" placeholder="输入消毒液量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>餐具(L)：</label>
            <input type="number" id="tablewareWater" placeholder="输入消毒液量">
        </div>
        <div>
            <label>遗体(L)：</label>
            <input type="number" id="bodyWater" placeholder="输入消毒液量">
        </div>
    </div>

    <div class="split-wrap">
        <div class="split"></div>
        <div class="surface-title">环境、物表消毒</div>
    </div>

    <div class="row-item">
        <div>
            <label>长度(米)：</label>
            <input type="number" id="len" placeholder="输入长度">
        </div>
        <div>
            <label>宽度(米)：</label>
            <input type="number" id="wid" placeholder="输入宽度">
        </div>
    </div>
    <div class="row-item">
        <div>
            <label>墙高(米)：</label>
            <input type="number" id="height" placeholder="输入墙高">
        </div>
        <div>
            <label>用量(ml/㎡)：</label>
            <input type="number" id="dose" value="200">
        </div>
    </div>
    <div class="row-item">
        <div>
            <label>原液浓度(%)：</label>
            <input type="number" id="origConc" value="5" min="0.1" step="0.1">
        </div>
        <div>
            <label>目标浓度(mg/L)：</label>
            <input type="number" id="targetEnv" value="1000" min="100">
        </div>
    </div>

    <div class="calc-row">
        <button id="calcBtn" onclick="calcAll()">计算</button>
        <button id="resetBtn" onclick="resetAll()">重置</button>
        <button id="unitSwitchBtn" onclick="switchUnit()">ml/L单位转换</button>
    </div>

    <div class="res" id="result"></div>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let useMLUnit = true;

function autoSetDose() {
    let val = parseFloat(document.getElementById('sputum').value) || 0;
    document.getElementById('dose').value = val > 0 ? 300 : 200;
}

function switchUnit(){
    useMLUnit = !useMLUnit;
    calcAll();
}

function formatNum(num) {
    num = parseFloat(num) || 0;
    num = Number(num.toFixed(1));
    if(useMLUnit){
        return num >= 1000 ? (num/1000).toFixed(1) + " L" : num + " ml";
    }else{
        return num >= 1000 ? num + " ml" : (num/1000).toFixed(1) + " L";
    }
}

function resetAll() {
    const inputs = document.querySelectorAll('input[type="number"]');
    inputs.forEach(input => {
        input.value = '';
    });
    document.getElementById('dose').value = 200;
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 1000;
    document.getElementById('result').innerHTML = '';
}

function calcAll() {
    let sputumMl = parseFloat(document.getElementById('sputum').value) || 0;
    let cleanWaterL = parseFloat(document.getElementById('cleanWater').value) || 0;
    let rubWaterL = parseFloat(document.getElementById('rubWater').value) || 0;
    let vomitMl = parseFloat(document.getElementById('vomit').value) || 0;
    let fecesMl = parseFloat(document.getElementById('feces').value) || 0;
    let urineMl = parseFloat(document.getElementById('urine').value) || 0;
    let sewageL = parseFloat(document.getElementById('sewage').value) || 0;
    let fabricWaterL = parseFloat(document.getElementById('fabricWater').value) || 0;
    let tablewareWaterL = parseFloat(document.getElementById('tablewareWater').value) || 0;
    let bodyWaterL = parseFloat(document.getElementById('bodyWater').value) || 0;

    let L = parseFloat(document.getElementById('len').value) || 0;
    let W = parseFloat(document.getElementById('wid').value) || 0;
    let H = parseFloat(document.getElementById('height').value) || 0;
    let perMl = parseFloat(document.getElementById('dose').value) || 200;
    let origPct = parseFloat(document.getElementById('origConc').value) || 5;
    let targetEnv = parseFloat(document.getElementById('targetEnv').value) || 1000;

    const targetSputum = 20000;
    const targetClean = 1000;
    const targetRubbish = 1000;
    const targetVomit = 20000;
    const targetFeces = 50000;
    const targetUrine = 10000;
    const targetFabric = 500;
    const targetTableware = 500;
    const targetBody = 10000;
    let origMgL = origPct * 10000;

    let floorArea = L * W;
    let wallArea = 2 * (L + W) * H;
    let totalArea = floorArea + wallArea;
    let envTotalMl = totalArea * perMl;
    let envStock = origMgL === 0 ? 0 : (targetEnv * envTotalMl) / origMgL;
    let envWater = envTotalMl - envStock;

    let cleanWaterMl = cleanWaterL * 1000;
    let cleanStock = origMgL === 0 ? 0 : (targetClean * cleanWaterMl) / origMgL;
    let cleanNeedWater = cleanWaterMl - cleanStock;

    let rubWaterMl = rubWaterL * 1000;
    let rubStock = origMgL === 0 ? 0 : (targetRubbish * rubWaterMl) / origMgL;
    let rubNeedWater = rubWaterMl - rubStock;

    let vomitTotal = vomitMl * 1;
    let vomitStock = origMgL === 0 ? 0 : (targetVomit * vomitTotal) / origMgL;
    let vomitWater = vomitTotal - vomitStock;

    let fecesTotal = fecesMl * 2;
    let fecesStock = origMgL === 0 ? 0 : (targetFeces * fecesTotal) / origMgL;
    let fecesWater = fecesTotal - fecesStock;

    let urineTotal = urineMl * 10;
    let urineStock = origMgL === 0 ? 0 : (targetUrine * urineTotal) / origMgL;
    let urineWater = urineTotal - urineStock;

    let sewageStock = 0;
    if (sewageL > 0 && origPct > 0) {
        let coe = sewageL <= 100 ? 20 : 10;
        sewageStock = coe * sewageL / origPct;
    }

    let fabricWaterMl = fabricWaterL * 1000;
    let fabricStock = origMgL === 0 ? 0 : (targetFabric * fabricWaterMl) / origMgL;
    let fabricNeedWater = fabricWaterMl - fabricStock;

    let tablewareWaterMl = tablewareWaterL * 1000;
    let tablewareStock = origMgL === 0 ? 0 : (targetTableware * tablewareWaterMl) / origMgL;
    let tablewareNeedWater = tablewareWaterMl - tablewareStock;

    let bodyWaterMl = bodyWaterL * 1000;
    let bodyStock = origMgL === 0 ? 0 : (targetBody * bodyWaterMl) / origMgL;
    let bodyNeedWater = bodyWaterMl - bodyStock;

    let html = "";

    if (sputumMl > 0) {
        let spuTotalMl = sputumMl * 2;
        let spuStock = origMgL === 0 ? 0 : (targetSputum * spuTotalMl) / origMgL;
        let spuWater = spuTotalMl - spuStock;
        if (spuWater < 0) {
            html += `<p><span class="blue-title">【痰液消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【痰液消毒】</span>原液 <strong>${formatNum(spuStock)}</strong>；加水 <strong>${formatNum(spuWater)}</strong>；浸泡静置，作用时间：2小时</p>`;
        }
    }
    if (cleanWaterL > 0) {
        if (cleanNeedWater < 0) {
            html += `<p><span class="blue-title">【清洁用品消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【清洁用品消毒】</span>原液 <strong>${formatNum(cleanStock)}</strong>；加水 <strong>${formatNum(cleanNeedWater)}</strong>；浸泡，作用时间：30分钟</p>`;
        }
    }
    if (rubWaterL > 0) {
        if (rubNeedWater < 0) {
            html += `<p><span class="blue-title">【垃圾消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【垃圾消毒】</span>原液 <strong>${formatNum(rubStock)}</strong>；加水 <strong>${formatNum(rubNeedWater)}</strong>；滞留喷洒，作用时间：1小时</p>`;
        }
    }
    if (vomitMl > 0) {
        if (vomitWater < 0) {
            html += `<p><span class="blue-title">【呕吐物消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【呕吐物消毒】</span>原液 <strong>${formatNum(vomitStock)}</strong>；加水 <strong>${formatNum(vomitWater)}</strong>；搅匀静置，作用时间：2小时</p>`;
        }
    }
    if (fecesMl > 0) {
        html += `<p><span class="blue-title">【大便消毒】</span>加入原液<strong>${formatNum(fecesStock)}</strong>，搅匀静置，作用时间：2小时</p>`;
    }
    if (urineMl > 0) {
        if (urineWater < 0) {
            html += `<p><span class="blue-title">【小便消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【小便消毒】</span>原液 <strong>${formatNum(urineStock)}</strong>；加水 <strong>${formatNum(urineWater)}</strong>；搅匀静置，作用时间：2小时</p>`;
        }
    }
    if (sewageL > 0) {
        html += `<p><span class="blue-title">【污水消毒】</span>加入原液<strong>${formatNum(sewageStock)}</strong>，搅匀静置，作用时间：1-2小时</p>`;
    }
    if (fabricWaterL > 0) {
        if (fabricNeedWater < 0) {
            html += `<p><span class="blue-title">【织物消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【织物消毒】</span>原液 <strong>${formatNum(fabricStock)}</strong>；加水 <strong>${formatNum(fabricNeedWater)}</strong>；浸泡，作用时间：30分钟</p>`;
        }
    }
    if (tablewareWaterL > 0) {
        if (tablewareNeedWater < 0) {
            html += `<p><span class="blue-title">【餐具消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【餐具消毒】</span>原液 <strong>${formatNum(tablewareStock)}</strong>；加水 <strong>${formatNum(tablewareNeedWater)}</strong>；浸泡，作用时间：30分钟</p>`;
        }
    }
    if (bodyWaterL > 0) {
        if (bodyNeedWater < 0) {
            html += `<p><span class="blue-title">【遗体消毒】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【遗体消毒】</span>原液 <strong>${formatNum(bodyStock)}</strong>；加水 <strong>${formatNum(bodyNeedWater)}</strong>；浸湿布巾包裹消杀</p>`;
        }
    }
    if (totalArea > 0) {
        if (envWater < 0) {
            html += `<p><span class="blue-title">【环境消杀】</span><strong>84 原液浓度不足</strong></p>`;
        } else {
            html += `<p><span class="blue-title">【环境消杀】</span>总面积：${totalArea.toFixed(1)}㎡，原液 <strong>${formatNum(envStock)}</strong>；加水 <strong>${formatNum(envWater)}</strong>；滞留喷洒密闭，作用时间：60分钟</p>`;
        }
    }

    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
