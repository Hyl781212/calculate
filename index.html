<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传染病消毒剂配制计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft Yahei", 微软雅黑;
            max-width: 480px;
            margin: 30px auto;
            padding: 25px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: 22px;
            margin-bottom: 8px;
            margin-top: 0;
        }
        .drug-name{
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 22px;
        }
        .row-item{
            display: flex;
            margin: 12px 0;
            align-items: center;
        }
        .title-label {
            color: #005a9c;
            font-weight: bold;
            font-size: 16px;
            width: 85px;
            white-space: nowrap;
        }
        label {
            display: inline-block;
            color: #333;
            font-weight: 500;
            white-space: nowrap;
        }
        select, input {
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #b8c8dc;
            outline: none;
        }
        #disinfectObj {
            width: 115px;
            margin-right: 8px;
        }
        #inputVal{
            width: 140px;
        }
        #len {
            width: 115px;
            margin-right: 8px;
        }
        #wid{
            width: 115px;
        }
        #wallType {
            width: 115px;
            margin-right: 8px;
        }
        #wallDose {
            width: 115px;
        }
        #origConc,#targetEnv{
            width: 90px;
        }
        input:focus, select:focus {
            border-color: #005a9c;
        }
        .calc-row{
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        #calcBtn, #resetBtn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 17px;
            cursor: pointer;
            font-weight: 500;
        }
        #calcBtn {
            background: #005a9c;
            color: #fff;
        }
        #resetBtn {
            background: #dc3545;
            color: #fff;
        }
        .res {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafe;
            border-radius: 8px;
            font-size: 16px;
            line-height: 2;
        }
        .res p {
            margin: 8px 0;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .blue-title{
            color: #005a9c;
            font-weight: bold;
        }
        .bottom-info{
            margin-top: 25px;
            text-align: center;
            color: #668cb3;
            font-size: 14px;
            font-weight: normal;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <h3>传染病消毒剂配制计算器</h3>
    <div class="drug-name">消毒剂名称：次氯酸钠（俗称84）</div>

    <div class="row-item">
        <div class="title-label">消毒对象：</div>
        <select id="disinfectObj">
            <option value="sputum">痰液(ml)</option>
            <option value="fabricWater">物表(L)</option>
            <option value="tablewareWater">餐具(L)</option>
            <option value="cleanWater">清洁用品(L)</option>
            <option value="rubWater">垃圾(L)</option>
            <option value="vomit">呕吐物(ml)</option>
            <option value="feces">大便(ml)</option>
            <option value="urine">小便(ml)</option>
            <option value="sewage">生活污水(L)</option>
            <option value="bodyWater">遗体(L)</option>
        </select>
        <input type="number" id="inputVal" placeholder="请先选择消毒对象">
    </div>

    <div class="row-item">
        <div class="title-label">室内消毒：</div>
        <label>长度</label>
        <input type="number" id="len" placeholder="输入米">
        <label>；宽度</label>
        <input type="number" id="wid" placeholder="输入米">
    </div>
    <div class="row-item">
        <label style="width:85px;"></label>
        <label>墙面</label>
        <select id="wallType">
            <option value="none">不消毒</option>
            <option value="soil">泥土</option>
            <option value="other">其他</option>
        </select>
        <label>，用量</label>
        <input type="text" id="wallDose">
    </div>
    <div class="row-item">
        <label>原液浓度(%)</label>
        <input type="number" id="origConc" value="5" min="0.1" step="0.1">
        <label>；目标浓度(mg/L)</label>
        <input type="number" id="targetEnv" value="1000" min="100">
    </div>

    <div class="calc-row">
        <button id="calcBtn" onclick="calcAll()">计算</button>
        <button id="resetBtn" onclick="resetAll()">重置</button>
    </div>

    <div class="res" id="result"></div>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let useMLUnit = true;

document.getElementById('wallType').addEventListener('change', function(){
    const val = this.value;
    const doseInput = document.getElementById('wallDose');
    if(val === 'none'){
        doseInput.value = '';
    }else if(val === 'soil'){
        doseInput.value = '150ml/m²';
    }else{
        doseInput.value = '100ml/m²';
    }
});
document.getElementById('wallType').dispatchEvent(new Event('change'));

document.getElementById('disinfectObj').addEventListener('change', function(){
    const val = this.value;
    const input = document.getElementById('inputVal');
    switch(val){
        case 'sputum': input.placeholder="输入痰液量"; break;
        case 'vomit': input.placeholder="输入呕吐物量"; break;
        case 'feces': input.placeholder="输入大便量"; break;
        case 'urine': input.placeholder="输入小便量"; break;
        case 'sewage': input.placeholder="输入污水量"; break;
        case 'cleanWater':
        case 'rubWater':
        case 'fabricWater':
        case 'tablewareWater':
        case 'bodyWater':
            input.placeholder="输入消毒液量"; break;
    }
});
document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

function formatNum(num) {
    num = parseFloat(num) || 0;
    num = Number(num.toFixed(1));
    if(useMLUnit){
        return num >= 1000 ? (num/1000).toFixed(1) + " L" : num + " ml";
    }else{
        return num >= 1000 ? num + " ml" : (num/1000).toFixed(1) + " L";
    }
}

function resetAll() {
    document.getElementById('inputVal').value = '';
    document.getElementById('len').value = '';
    document.getElementById('wid').value = '';
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 1000;
    document.getElementById('wallType').value = 'none';
    document.getElementById('wallType').dispatchEvent(new Event('change'));
    document.getElementById('result').innerHTML = '';
    document.getElementById('disinfectObj').value = 'sputum';
    document.getElementById('disinfectObj').dispatchEvent(new Event('change'));
}

function calcAll() {
    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;

    let wallDosePer = 0;
    let wallH = 0;
    if(wallType !== 'none'){
        wallH = 2;
        let wallDoseText = document.getElementById('wallDose').value;
        wallDosePer = parseFloat(wallDoseText.replace(/[^0-9.]/g,'')) || 100;
    }

    const groundDosePer = (obj === 'sputum' && val > 0) ? 300 : 100;

    const origPct = parseFloat(document.getElementById('origConc').value) || 5;
    const targetEnv = parseFloat(document.getElementById('targetEnv').value) || 1000;

    const groundArea = L * W;
    const wallArea = 2 * (L + W) * wallH;
    const totalArea = groundArea + wallArea;

    const origMgL = origPct * 10000;
    let envStock = 0, envWater = 0;
    if(totalArea > 0){
        const totalMl = groundArea * groundDosePer + wallArea * wallDosePer;
        envStock = (totalMl * targetEnv) / origMgL;
        envWater = totalMl - envStock;
    }

    let html = "";
    if (obj === 'sputum' && val > 0) {
        let spuTotalMl = val * 2;
        let spuStock = origMgL === 0 ? 0 : (20000 * spuTotalMl) / origMgL;
        let spuWater = spuTotalMl - spuStock;
        html += `<p><span class="blue-title">【痰液消毒】</span>原液 <strong>${formatNum(spuStock)}</strong>；加水 <strong>${formatNum(spuWater)}</strong>；浸泡静置，作用时间：2小时</p>`;
    }
    if (obj === 'fabricWater' && val > 0) {
        let totalMl = val * 1000;
        let stock = origMgL === 0 ? 0 : (1000 * totalMl) / origMgL;
        let water = totalMl - stock;
        html += `<p><span class="blue-title">【物表消毒】</span>原液 <strong>${formatNum(stock)}</strong>；加水 <strong>${formatNum(water)}</strong>；擦拭/喷洒，作用时间：30分钟</p>`;
    }
    if (obj === 'tablewareWater' && val > 0) {
        let totalMl = val * 1000;
        let stock = origMgL === 0 ? 0 : (500 * totalMl) / origMgL;
        let water = totalMl - stock;
        html += `<p><span class="blue-title">【餐具消毒】</span>原液 <strong>${formatNum(stock)}</strong>；加水 <strong>${formatNum(water)}</strong>；浸泡，作用时间：30分钟</p>`;
    }
    if (totalArea > 0) {
        html += `<p><span class="blue-title">【室内消杀】</span>地面${groundArea.toFixed(1)}㎡`;
        if(wallType !== 'none'){
            html += `，墙面${wallArea.toFixed(1)}㎡`;
        }
        html += `<br>总面积${totalArea.toFixed(1)}㎡<br>原液：<strong>${formatNum(envStock)}</strong>；加水：<strong>${formatNum(envWater)}</strong>；滞留喷洒密闭，作用时间：60分钟</p>`;
    }

    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
