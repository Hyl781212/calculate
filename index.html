<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <!-- 微信卡片链接专用配置 -->
<meta property="og:title" content="84消毒液配比计算公式">
<meta property="og:description" content="快速计算不同浓度84消毒液配比，实用又方便">
<meta property="og:image" content="https://www.51yuansu.com/sc/sqcnaxhmbd.html/cover.jpg">
<meta property="og:url" content="https://Hyl781212.github.io/calculate/">
<meta property="og:type" content="website">
</head>
<body>
    <h3>环境消杀及痰液84配比计算器</h3>

    <div class="item">
        <label>痰液量(ml)：</label>
        <input type="number" id="sputum" placeholder="输入痰液毫升数">
    </div>

    <div class="split"></div>

    <div class="item">
        <label>房间长度(米)：</label>
        <input type="number" id="len" placeholder="输入长度">
    </div>
    <div class="item">
        <label>房间宽度(米)：</label>
        <input type="number" id="wid" placeholder="输入宽度">
    </div>
    <div class="item">
        <label>墙面高度(米)：</label>
        <input type="number" id="height" placeholder="输入层高">
    </div>
    <div class="item">
        <label>消杀用量(ml/㎡)：</label>
        <input type="number" id="dose" value="200">
    </div>
    <div class="item">
        <label>84原液浓度(%)：</label>
        <input type="number" id="origConc" value="5">
    </div>
    <div class="item">
        <label>环境目标浓度(mg/L)：</label>
        <input type="number" id="targetEnv" value="1000">
    </div>

    <button id="calcBtn" onclick="calcAll()">立即计算</button>

    <div class="res" id="result"></div>

    <div class="footer">恩施市疾控中心重大疾病科制作</div>

<script>
function calcAll(){
    // 1. 获取输入
    let sputumMl = parseFloat(document.getElementById('sputum').value) || 0;
    let L = parseFloat(document.getElementById('len').value) || 0;
    let W = parseFloat(document.getElementById('wid').value) || 0;
    let H = parseFloat(document.getElementById('height').value) || 0;
    let perMl = parseFloat(document.getElementById('dose').value);
    let origPct = parseFloat(document.getElementById('origConc').value);
    let targetEnv = parseFloat(document.getElementById('targetEnv').value);

    // 固定痰液消毒浓度
    const targetSputum = 20000;
    let origMgL = origPct * 10000;

    // 2. 环境消杀计算 地面+四面墙
    let floorArea = L * W;
    let wallArea = 2 * (L + W) * H;
    let totalArea = floorArea + wallArea;
    let envTotalMl = totalArea * perMl;
    let envTotalL = envTotalMl / 1000;

    let envStock = (targetEnv * envTotalL / origMgL) * 1000;
    let envWater = envTotalMl - envStock;

    let html = "";

    // 3. 判断痰液是否有输入
    if(sputumMl > 0){
        // 痰液消毒：配置量=痰液2倍
        let spuTotalMl = sputumMl * 2;
        let spuTotalL = spuTotalMl / 1000;
        let spuStock = (targetSputum * spuTotalL / origMgL) * 1000;
        let spuWater = spuTotalMl - spuStock;

        html += `<p>【痰液消毒配比】</p >`;
        html += `<p>需量取84原液：<strong>${spuStock.toFixed(1)} ml</strong></p >`;
        html += `<p>需加水：<strong>${spuWater.toFixed(1)} ml</strong></p >`;
        html += `<hr>`;
    }

    // 4. 环境消杀始终显示
    html += `<p>【环境消杀配比】</p >`;
    html += `<p>需量取84原液：<strong>${envStock.toFixed(1)} ml</strong></p >`;
    html += `<p>需加水：<strong>${envWater.toFixed(1)} ml</strong></p >`;

    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
