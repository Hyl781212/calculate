<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>84消毒液配比计算器</title>
    <style>
        body {
            font-family: "Microsoft Yahei",微软雅黑;
            max-width: 480px;
            margin: 40px auto;
            padding: 25px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: 20px;
            margin-bottom: 25px;
            margin-top:0;
        }
        .row-item{
            display:flex;
            gap:15px;
            margin:14px 0;
        }
        .item {
            margin: 14px 0;
        }
        label {
            display:inline-block;
            width: 160px;
            color: #333;
            font-weight: 500;
        }
        .row-item label{
            width:110px;
        }
        input {
            width: 200px;
            padding: 9px 10px;
            font-size: 16px;
            border: 1px solid #b8c8dc;
            border-radius: 4px;
            outline: none;
        }
        .row-item input{
            width:130px;
        }
        .btn-group{
            margin:14px 0;
            text-align: center;
        }
        .type-btn{
            padding:8px 16px;
            border:none;
            border-radius:4px;
            font-size:15px;
            cursor:pointer;
            margin:0 8px;
        }
        .type-btn.active{
            background:#005a9c;
            color:#fff;
        }
        .type-btn.normal{
            background:#e8edf5;
            color:#333;
        }
        .unit-btn{
            padding:6px 14px;
            border:none;
            border-radius:3px;
            cursor:pointer;
            margin:0 5px;
        }
        .unit-active{
            background:#005a9c;
            color:#fff;
        }
        .calc-row{
            display:flex;
            gap:10px;
            margin:15px 0;
        }
        #calcBtn, #resetBtn {
            flex:1;
            padding: 11px;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            cursor: pointer;
        }
        #calcBtn {
            background: #005a9c;
            color: #fff;
        }
        #resetBtn {
            background: #dc3545;
            color: #fff;
        }
        .res {
            margin-top: 15px;
            padding: 20px;
            background: #f7fafe;
            border-radius: 6px;
            font-size: 18px;
            line-height: 2.2;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .blue-title{
            color:#005a9c;
            font-weight:bold;
        }
        .split{
            margin:20px 0;height:1px;background:#ccc;
        }
        .bottom-info{
            margin-top: 30px;
            text-align: center;
            color: #005a9c;
            font-size: 16px;
            font-weight: bold;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
        hr {
            border: none;
            height: 1px;
            background-color: #dce4ee;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h3>84消毒液配比计算器</h3>

    <div class="btn-group">
        <button class="type-btn active" id="btn2" onclick="setType(2)">预防性消毒</button>
        <button class="type-btn normal" id="btn1" onclick="setType(1)">疫源地消毒</button>
    </div>

    <div class="row-item">
        <div>
            <label>痰液(ml)：</label>
            <input type="number" id="sputum" placeholder="输入痰液量" oninput="autoSetDose()">
        </div>
        <div>
            <label>清洁用品(L)：</label>
            <input type="number" id="cleanWater" placeholder="输入消毒液量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>垃圾(L)：</label>
            <input type="number" id="rubWater" placeholder="输入消毒液量">
        </div>
        <div>
            <label>呕吐物(ml)：</label>
            <input type="number" id="vomit" placeholder="输入呕吐物量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>大便(ml)：</label>
            <input type="number" id="feces" placeholder="输入大便量">
        </div>
        <div>
            <label>小便(ml)：</label>
            <input type="number" id="urine" placeholder="输入小便量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>污水(L)：</label>
            <input type="number" id="sewage" placeholder="输入污水量">
        </div>
        <div>
            <label>织物(L)：</label>
            <input type="number" id="fabricWater" placeholder="输入消毒液量">
        </div>
    </div>

    <div class="row-item">
        <div>
            <label>餐具(L)：</label>
            <input type="number" id="tablewareWater" placeholder="输入消毒液量">
        </div>
        <div>
            <label>遗体(L)：</label>
            <input type="number" id="bodyWater" placeholder="输入消毒液量">
        </div>
    </div>

    <div class="split"></div>

    <div class="row-item">
        <div>
            <label>长度(米)：</label>
            <input type="number" id="len" placeholder="输入长度">
        </div>
        <div>
            <label>宽度(米)：</label>
            <input type="number" id="wid" placeholder="输入宽度">
        </div>
    </div>
    <div class="row-item">
        <div>
            <label>墙高(米)：</label>
            <input type="number" id="height" placeholder="输入墙高">
        </div>
        <div>
            <label>用量(ml/㎡)：</label>
            <input type="number" id="dose" value="200">
        </div>
    </div>
    <div class="row-item">
        <div>
            <label>原液浓度(%)：</label>
            <input type="number" id="origConc" value="5">
        </div>
        <div>
            <label>目标浓度(mg/L)：</label>
            <input type="number" id="targetEnv" value="500">
        </div>
    </div>

    <div class="calc-row">
        <button id="calcBtn" onclick="calcAll()">计算</button>
        <button id="resetBtn" onclick="resetAll()">重置</button>
    </div>

    <div class="res" id="result"></div>

    <div class="btn-group">
        <button class="unit-btn unit-active" id="unitML" onclick="setUnit('ml')">毫升(ml)</button>
        <button class="unit-btn" id="unitL" onclick="setUnit('L')">升(L)</button>
    </div>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let nowUnit = "ml";

function setUnit(u){
    nowUnit = u;
    let mlBtn = document.getElementById('unitML');
    let lBtn = document.getElementById('unitL');
    if(u === 'ml'){
        mlBtn.className = "unit-btn unit-active";
        lBtn.className = "unit-btn";
    }else{
        mlBtn.className = "unit-btn";
        lBtn.className = "unit-btn unit-active";
    }
    calcAll();
}

function autoSetDose(){
    let val = parseFloat(document.getElementById('sputum').value) || 0;
    document.getElementById('dose').value = val > 0 ? 300 : 200;
}

function setType(t){
    let b1=document.getElementById('btn1');
    let b2=document.getElementById('btn2');
    if(t===1){
        b1.className="type-btn active";
        b2.className="type-btn normal";
        document.getElementById('targetEnv').value=1000;
    }else{
        b1.className="type-btn normal";
        b2.className="type-btn active";
        document.getElementById('targetEnv').value=500;
    }
    calcAll();
}

function formatNum(num){
    num = isNaN(num) ? 0 : num;
    if(nowUnit === "ml"){
        return num.toFixed(1) + " ml";
    }else{
        return (num / 1000).toFixed(3) + " L";
    }
}

function resetAll(){
    document.getElementById('sputum').value = '';
    document.getElementById('cleanWater').value = '';
    document.getElementById('rubWater').value = '';
    document.getElementById('vomit').value = '';
    document.getElementById('feces').value = '';
    document.getElementById('urine').value = '';
    document.getElementById('sewage').value = '';
    document.getElementById('fabricWater').value = '';
    document.getElementById('tablewareWater').value = '';
    document.getElementById('bodyWater').value = '';
    document.getElementById('len').value = '';
    document.getElementById('wid').value = '';
    document.getElementById('height').value = '';
    document.getElementById('dose').value = 200;
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 500;
    document.getElementById('result').innerHTML = '';
    setType(2);
    setUnit('ml');
}

function calcAll(){
    let sputumMl = parseFloat(document.getElementById('sputum').value) || 0;
    let cleanWaterL = parseFloat(document.getElementById('cleanWater').value) || 0;
    let rubWaterL = parseFloat(document.getElementById('rubWater').value) || 0;
    let vomitMl = parseFloat(document.getElementById('vomit').value) || 0;
    let fecesMl = parseFloat(document.getElementById('feces').value) || 0;
    let urineMl = parseFloat(document.getElementById('urine').value) || 0;
    let sewageL = parseFloat(document.getElementById('sewage').value) || 0;
    let fabricWaterL = parseFloat(document.getElementById('fabricWater').value) || 0;
    let tablewareWaterL = parseFloat(document.getElementById('tablewareWater').value) || 0;
    let bodyWaterL = parseFloat(document.getElementById('bodyWater').value) || 0;

    let L = parseFloat(document.getElementById('len').value) || 0;
    let W = parseFloat(document.getElementById('wid').value) || 0;
    let H = parseFloat(document.getElementById('height').value) || 0;
    let perMl = parseFloat(document.getElementById('dose').value) || 200;
    let origPct = parseFloat(document.getElementById('origConc').value) || 5;
    let targetEnv = parseFloat(document.getElementById('targetEnv').value) || 500;

    // 浓度配置
    const targetSputum = 20000;
    const targetClean = 1000;
    const targetRubbish = 1000;
    const targetVomit = 20000;
    const targetFeces = 50000;
    const targetUrine = 10000;
    const targetSewageHigh = 20000;
    const targetSewageLow = 100;
    const targetFabric = 500;
    const targetTableware = 500;
    const targetBody = 10000;
    let origMgL = origPct * 10000;

    // 环境
    let floorArea = L * W;
    let wallArea = 2 * (L + W) * H;
    let totalArea = floorArea + wallArea;
    let envTotalMl = totalArea * perMl;
    let envStock = (targetEnv * envTotalMl) / origMgL;
    let envWater = envTotalMl - envStock;

    // 清洁用品：单位L
    let cleanWaterMl = cleanWaterL * 1000;
    let cleanStock = (targetClean * cleanWaterMl) / origMgL;
    let cleanNeedWater = cleanWaterMl - cleanStock;

    // 垃圾：单位L
    let rubWaterMl = rubWaterL * 1000;
    let rubStock = (targetRubbish * rubWaterMl) / origMgL;
    let rubNeedWater = rubWaterMl - rubStock;

    // 呕吐物：×1
    let vomitTotal = vomitMl * 1;
    let vomitStock = (targetVomit * vomitTotal) / origMgL;
    let vomitWater = vomitTotal - vomitStock;

    // 大便：×2
    let fecesTotal = fecesMl * 2;
    let fecesStock = (targetFeces * fecesTotal) / origMgL;
    let fecesWater = fecesTotal - fecesStock;

    // 小便：×10
    let urineTotal = urineMl * 10;
    let urineStock = (targetUrine * urineTotal) / origMgL;
    let urineWater = urineTotal - urineStock;

    // 污水特殊逻辑
    let sewageStock, sewageWater;
    if(sewageL > 10){
        sewageStock = sewageL * 100;
        sewageWater = 0;
    }else{
        let sewageTotalL = sewageL * 0.01;
        let sewageTotalMl = sewageTotalL * 1000;
        sewageStock = (targetSewageHigh * sewageTotalMl) / origMgL;
        sewageWater = sewageTotalMl - sewageStock;
    }

    // 织物：单位L
    let fabricWaterMl = fabricWaterL * 1000;
    let fabricStock = (targetFabric * fabricWaterMl) / origMgL;
    let fabricNeedWater = fabricWaterMl - fabricStock;

    // 餐具：单位L，同垃圾
    let tablewareWaterMl = tablewareWaterL * 1000;
    let tablewareStock = (targetTableware * tablewareWaterMl) / origMgL;
    let tablewareNeedWater = tablewareWaterMl - tablewareStock;

    // 遗体：单位L，同垃圾，浓度10000
    let bodyWaterMl = bodyWaterL * 1000;
    let bodyStock = (targetBody * bodyWaterMl) / origMgL;
    let bodyNeedWater = bodyWaterMl - bodyStock;

    let html = "";

    if(sputumMl > 0){
        let spuTotalMl = sputumMl * 2;
        let spuStock = (targetSputum * spuTotalMl) / origMgL;
        let spuWater = spuTotalMl - spuStock;
        html += `<p><span class="blue-title">【痰液消毒】</span>原液 <strong>${formatNum(spuStock)}</strong>；加水 <strong>${formatNum(spuWater)}</strong>；浸泡，2h。</p>`;
    }
    if(cleanWaterL > 0){
        html += `<p><span class="blue-title">【清洁用品消毒】</span>原液 <strong>${formatNum(cleanStock)}</strong>；加水 <strong>${formatNum(cleanNeedWater)}</strong>；浸泡，30min。</p>`;
    }
    if(rubWaterL > 0){
        html += `<p><span class="blue-title">【垃圾消毒】</span>原液 <strong>${formatNum(rubStock)}</strong>；加水 <strong>${formatNum(rubNeedWater)}</strong>；喷洒，1h。</p>`;
    }
    if(vomitMl > 0){
        html += `<p><span class="blue-title">【呕吐物消毒】</span>原液 <strong>${formatNum(vomitStock)}</strong>；加水 <strong>${formatNum(vomitWater)}</strong>；搅匀放置，2h。</p>`;
    }
    if(fecesMl > 0){
        html += `<p><span class="blue-title">【大便消毒】</span>原液 <strong>${formatNum(fecesStock)}</strong>；加水 <strong>${formatNum(fecesWater)}</strong>；搅匀放置，2h。</p>`;
    }
    if(urineMl > 0){
        html += `<p><span class="blue-title">【小便消毒】</span>原液 <strong>${formatNum(urineStock)}</strong>；加水 <strong>${formatNum(urineWater)}</strong>；搅匀放置，2h。</p>`;
    }
    if(sewageL > 0){
        html += `<p><span class="blue-title">【污水消毒】</span>原液 <strong>${formatNum(sewageStock)}</strong>；加水 <strong>${formatNum(sewageWater)}</strong>；搅匀放置，2h。</p>`;
    }
    if(fabricWaterL > 0){
        html += `<p><span class="blue-title">【织物消毒】</span>原液 <strong>${formatNum(fabricStock)}</strong>；加水 <strong>${formatNum(fabricNeedWater)}</strong>；浸泡，30min。</p>`;
    }
    if(tablewareWaterL > 0){
        html += `<p><span class="blue-title">【餐具消毒】</span>原液 <strong>${formatNum(tablewareStock)}</strong>；加水 <strong>${formatNum(tablewareNeedWater)}</strong>；浸泡，30min。</p>`;
    }
    if(bodyWaterL > 0){
        html += `<p><span class="blue-title">【遗体消毒】</span>原液 <strong>${formatNum(bodyStock)}</strong>；加水 <strong>${formatNum(bodyNeedWater)}</strong>；用布巾包裹。</p>`;
    }

    html += `<p><span class="blue-title">【环境消杀】</span>总面积：${totalArea.toFixed(2)}㎡，原液 <strong>${formatNum(envStock)}</strong>；加水 <strong>${formatNum(envWater)}</strong>；喷洒，60min。</p>`;

    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
