<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传染病消毒剂配制计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,body{
            overflow-x: hidden;
        }
        body {
            font-family: "Microsoft Yahei", 微软雅黑;
            width: 100%;
            max-width: 480px;
            margin: 15px auto;
            padding: 15px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 10px;
            box-shadow: 3px 3px 12px rgba(0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: clamp(18px,4vw,22px);
            margin-bottom: 8px;
        }
        .drug-name{
            text-align: center;
            color: #666;
            font-size: clamp(12px,3vw,14px);
            margin-bottom: 18px;
        }
        .row-item{
            display: flex;
            margin: 10px 0;
            align-items: center;
            flex-wrap: nowrap;
            gap: 6px;
            width: 100%;
        }
        .title-label {
            color: #005a9c;
            font-weight: bold;
            font-size: clamp(12px,3vw,14px);
            width: 80px;
            min-width: 80px;
            white-space: nowrap;
        }
        label {
            display: inline-block;
            color: #333;
            font-weight: 500;
            white-space: nowrap;
            font-size: clamp(12px,3vw,14px);
        }
        select, input {
            padding: 8px 10px;
            font-size: clamp(12px,3vw,14px);
            border: 1px solid #b8c8dc;
            outline: none;
            flex-shrink: 1;
        }
        #disinfectObj {
            width: 32%;
            min-width: 120px;
        }
        #inputVal{
            width: 40%;
            min-width: 140px;
        }
        #len {
            width: 28%;
            min-width: 90px;
        }
        #wid{
            width: 28%;
            min-width: 90px;
        }
        #wallType {
            width: 28%;
            min-width: 90px;
        }
        #wallDose {
            width: 28%;
            min-width: 90px;
        }
        #origConc{
            width: 14%;
            min-width: 48px;
        }
        #targetEnv{
            width: 24%;
            min-width: 90px;
        }
        .btn-row{
            display: flex;
            gap: 8px;
            margin: 18px 0;
            width: 100%;
        }
        .btn-row button{
            flex:1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: clamp(14px,3vw,16px);
            cursor: pointer;
            font-weight: 500;
        }
        #calcBtn {
            background: #005a9c;
            color: #fff;
        }
        #resetBtn {
            background: #dc3545;
            color: #fff;
        }
        #convertBtn {
            background: #28a745;
            color: #fff;
        }
        input:focus, select:focus {
            border-color: #005a9c;
        }
        .res {
            margin-top: 15px;
            padding: 15px;
            background: #f7fafe;
            border-radius: 8px;
            font-size: clamp(12px,3vw,14px);
            line-height: 1.8;
        }
        .res p {
            margin: 6px 0;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .blue-title{
            color: #005a9c;
            font-weight: bold;
        }
        .bottom-info{
            margin-top: 20px;
            text-align: center;
            color: #668cb3;
            font-size: clamp(10px,2.5vw,12px);
            font-weight: normal;
            padding-top: 12px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <h3>传染病消毒剂配制计算器</h3>
    <div class="drug-name">消毒剂名称：次氯酸钠（俗称84）</div>

    <div class="row-item">
        <div class="title-label">消毒对象：</div>
        <select id="disinfectObj">
            <option value="sputum">痰液(L)</option>
            <option value="fabricWater">物表(L)</option>
            <option value="tablewareWater">餐具(L)</option>
            <option value="cleanWater">清洁用品(L)</option>
            <option value="rubWater">垃圾(L)</option>
            <option value="vomit">呕吐物(ml)</option>
            <option value="feces">大便(ml)</option>
            <option value="urine">小便(ml)</option>
            <option value="sewage">生活污水(L)</option>
            <option value="bodyWater">遗体(L)</option>
        </select>
        <input type="number" id="inputVal" placeholder="请先选择消毒对象">
    </div>

    <div class="row-item">
        <div class="title-label">室内消毒：</div>
        <label>长度</label>
        <input type="number" id="len" placeholder="输入米">
        <label>；宽度</label>
        <input type="number" id="wid" placeholder="输入米">
    </div>
    <div class="row-item">
        <label style="width:80px;min-width:80px;"></label>
        <label>墙面</label>
        <select id="wallType">
            <option value="none">不消毒</option>
            <option value="soil">泥土</option>
            <option value="other">水泥、木板、石灰</option>
            <option value="tile">瓷砖</option>
        </select>
        <label>，用量</label>
        <input type="text" id="wallDose">
    </div>
    <div class="row-item">
        <label>原液浓度(%)</label>
        <input type="number" id="origConc" value="5" min="0.1" step="0.1">
        <label>；作用浓度(mg/L)</label>
        <input type="number" id="targetEnv" value="1000" min="100" max="99999">
    </div>

    <div class="btn-row">
        <button id="calcBtn" onclick="calcAll()">计算</button>
        <button id="resetBtn" onclick="resetAll()">重置</button>
        <button id="convertBtn">ml/L转换</button>
    </div>

    <div class="res" id="result"></div>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let useAutoUnit = true;
let cacheSputum = 0, cacheSputumW = 0;
let cacheFabric = 0, cacheFabricW = 0;
let cacheTable = 0, cacheTableW = 0;
let cacheClean = 0, cacheCleanW = 0;
let cacheRub = 0, cacheRubW = 0;
let cacheVomit = 0, cacheVomitW = 0;
let cacheFeces = 0, cacheFecesW = 0;
let cacheUrine = 0, cacheUrineW = 0;
let cacheSewage = 0, cacheSewageW = 0;
let cacheBody = 0, cacheBodyW = 0;
let cacheRoom = 0, cacheRoomW = 0;

// 格式化数字：保留1位小数，.0 显示为整数
function formatNum(num) {
    let n = parseFloat(num) || 0;
    let fixed = n.toFixed(1);
    return fixed.endsWith('.0') ? parseInt(fixed) : fixed;
}

document.getElementById('convertBtn').addEventListener('click', function () {
    useAutoUnit = !useAutoUnit;
    renderAllResult();
});

document.getElementById('wallType').addEventListener('change', function () {
    const val = this.value;
    const doseInput = document.getElementById('wallDose');
    if (val === 'none') {
        doseInput.value = '';
    } else if (val === 'soil') {
        doseInput.value = '200ml/m²';
    } else if (val === 'other') {
        doseInput.value = '100ml/m²';
    } else if (val === 'tile') {
        doseInput.value = '50ml/m²';
    }
});
document.getElementById('wallType').dispatchEvent(new Event('change'));

document.getElementById('disinfectObj').addEventListener('change', function () {
    const val = this.value;
    const input = document.getElementById('inputVal');
    switch (val) {
        case 'sputum': input.placeholder = "输入痰液量"; break;
        case 'vomit': input.placeholder = "输入呕吐物量"; break;
        case 'feces': input.placeholder = "输入大便量"; break;
        case 'urine': input.placeholder = "输入小便量"; break;
        case 'sewage': input.placeholder = "输入污水量"; break;
        default: input.placeholder = "输入消毒液量";
    }
});
document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

function getUnitText(num) {
    num = parseFloat(num) || 0;
    let val, unit;
    if (useAutoUnit) {
        if (num >= 1000) {
            val = num / 1000;
            unit = 'L';
        } else {
            val = num;
            unit = 'ml';
        }
    } else {
        if (num >= 1000) {
            val = num;
            unit = 'ml';
        } else {
            val = num / 1000;
            unit = 'L';
        }
    }
    return [formatNum(val), unit];
}

function renderAllResult() {
    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;

    const groundArea = L * W;
    const wallArea = wallType !== 'none' ? 2 * (L + W) * 2 : 0;
    const totalArea = groundArea + wallArea;

    let html = "";

    if (obj === 'sputum' && val > 0) {
        let s = getUnitText(cacheSputum), w = getUnitText(cacheSputumW);
        html += `<p><span class="blue-title">【痰液消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${s[1]}</strong>；浸泡静置，作用时间2小时</p>`;
    }
    if (obj === 'fabricWater' && val > 0) {
        let s = getUnitText(cacheFabric), w = getUnitText(cacheFabricW);
        html += `<p><span class="blue-title">【物表消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；擦拭或喷洒，作用时间60分钟</p>`;
    }
    if (obj === 'tablewareWater' && val > 0) {
        let s = getUnitText(cacheTable), w = getUnitText(cacheTableW);
        html += `<p><span class="blue-title">【餐具消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；浸泡，作用时间30分钟</p>`;
    }
    if (obj === 'cleanWater' && val > 0) {
        let s = getUnitText(cacheClean), w = getUnitText(cacheCleanW);
        html += `<p><span class="blue-title">【清洁用品消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；浸泡，作用时间30分钟</p>`;
    }
    if (obj === 'rubWater' && val > 0) {
        let s = getUnitText(cacheRub), w = getUnitText(cacheRubW);
        html += `<p><span class="blue-title">【垃圾消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；喷洒浸透，作用时间60分钟</p>`;
    }
    if (obj === 'vomit' && val > 0) {
        let s = getUnitText(cacheVomit), w = getUnitText(cacheVomitW);
        html += `<p><span class="blue-title">【呕吐物消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；搅匀静置，作用时间2小时</p>`;
    }
    if (obj === 'feces' && val > 0) {
        let s = getUnitText(cacheFeces), w = getUnitText(cacheFecesW);
        if (cacheFecesW <= 0) {
            html += `<p><span class="blue-title">【大便消毒】</span>加入原液 <strong>${s[0]} ${s[1]}</strong>；搅匀静置，作用时间2小时</p>`;
        } else {
            html += `<p><span class="blue-title">【大便消毒】</span>加入原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；搅匀静置，作用时间2小时</p>`;
        }
    }
    if (obj === 'urine' && val > 0) {
        let s = getUnitText(cacheUrine), w = getUnitText(cacheUrineW);
        html += `<p><span class="blue-title">【小便消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；搅匀静置，作用时间2小时</p>`;
    }
    if (obj === 'sewage' && val > 0) {
        let s = getUnitText(cacheSewage);
        html += `<p><span class="blue-title">【生活污水消毒】</span>加入原液 <strong>${s[0]} ${s[1]}</strong>；搅匀静置，作用时间1.5小时，检查余氯大于6.5mg/L时才可排放。</p>`;
    }
    if (obj === 'bodyWater' && val > 0) {
        let s = getUnitText(cacheBody), w = getUnitText(cacheBodyW);
        html += `<p><span class="blue-title">【遗体消毒】</span>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；浸湿布巾包裹消杀</p>`;
    }
    if (totalArea > 0) {
        let s = getUnitText(cacheRoom), w = getUnitText(cacheRoomW);
        html += `<p><span class="blue-title">【室内消杀】</span>地面${formatNum(groundArea)}㎡`;
        if (wallArea > 0) {
            html += `，墙面${formatNum(wallArea)}㎡，总面积${formatNum(totalArea)}㎡`;
        }
        html += `<br>原液 <strong>${s[0]} ${s[1]}</strong>；加水 <strong>${w[0]} ${w[1]}</strong>；滞留喷洒，作用时间60分钟`;
        // 墙面不为“不消毒”时才追加提示语
        if (wallType !== 'none') {
            html += `。喷雾量根据墙面结构不同，以湿润不向下流水为度`;
        }
        html += `。</p>`;
    }

    document.getElementById('result').innerHTML = html;
}

function calcAll() {
    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;

    const wallH = wallType !== 'none' ? 2 : 0;
    const wallDoseText = document.getElementById('wallDose').value;
    const wallDosePer = parseFloat(wallDoseText.replace(/[^0-9.]/g, '')) || 100;
    const origPct = parseFloat(document.getElementById('origConc').value) || 5;
    const origMgL = origPct * 10000;

    // 清空缓存
    cacheSputum = cacheSputumW = 0;
    cacheFabric = cacheFabricW = 0;
    cacheTable = cacheTableW = 0;
    cacheClean = cacheCleanW = 0;
    cacheRub = cacheRubW = 0;
    cacheVomit = cacheVomitW = 0;
    cacheFeces = cacheFecesW = 0;
    cacheUrine = cacheUrineW = 0;
    cacheSewage = cacheSewageW = 0;
    cacheBody = cacheBodyW = 0;
    cacheRoom = cacheRoomW = 0;

    // 痰液
    if (obj === 'sputum' && val > 0) {
        let totalMl = val * 1000;
        cacheSputum = origMgL ? (20000 * totalMl) / origMgL : 0;
        cacheSputumW = totalMl - cacheSputum;
    }
    // 物表
    if (obj === 'fabricWater' && val > 0) {
        let totalMl = val * 1000;
        cacheFabric = origMgL ? (1000 * totalMl) / origMgL : 0;
        cacheFabricW = totalMl - cacheFabric;
    }
    // 餐具
    if (obj === 'tablewareWater' && val > 0) {
        let totalMl = val * 1000;
        cacheTable = origMgL ? (500 * totalMl) / origMgL : 0;
        cacheTableW = totalMl - cacheTable;
    }
    // 清洁用品
    if (obj === 'cleanWater' && val > 0) {
        let totalMl = val * 1000;
        cacheClean = origMgL ? (1000 * totalMl) / origMgL : 0;
        cacheCleanW = totalMl - cacheClean;
    }
    // 垃圾
    if (obj === 'rubWater' && val > 0) {
        let totalMl = val * 1000;
        cacheRub = origMgL ? (1000 * totalMl) / origMgL : 0;
        cacheRubW = totalMl - cacheRub;
    }
    // 呕吐物
    if (obj === 'vomit' && val > 0) {
        let totalMl = val;
        cacheVomit = origMgL ? (20000 * totalMl) / origMgL : 0;
        cacheVomitW = totalMl - cacheVomit;
    }
    // 大便
    if (obj === 'feces' && val > 0) {
        let totalMl = val * 2;
        cacheFeces = origMgL ? (50000 * totalMl) / origMgL : 0;
        cacheFecesW = totalMl - cacheFeces;
    }
    // 小便
    if (obj === 'urine' && val > 0) {
        let totalMl = val * 10;
        cacheUrine = origMgL ? (10000 * totalMl) / origMgL : 0;
        cacheUrineW = totalMl - cacheUrine;
    }
    // 生活污水
    if (obj === 'sewage' && val > 0) {
        let totalMl = val * 1000;
        let target = val <= 100 ? 200 : 100;
        cacheSewage = origMgL ? (target * totalMl) / origMgL : 0;
        cacheSewageW = totalMl - cacheSewage;
    }
    // 遗体
    if (obj === 'bodyWater' && val > 0) {
        let totalMl = val * 1000;
        cacheBody = origMgL ? (10000 * totalMl) / origMgL : 0;
        cacheBodyW = totalMl - cacheBody;
    }

    // 室内地面用量逻辑：默认200，选中痰液且有数值则300
    let groundDose = 200;
    if (obj === 'sputum' && val > 0) {
        groundDose = 300;
    }

    // 室内消杀总液量计算
    const groundArea = L * W;
    const wallArea = wallH ? 2 * (L + W) * wallH : 0;
    const totalMl = groundArea * groundDose + wallArea * wallDosePer;
    if (totalMl > 0) {
        let targetEnv = parseFloat(document.getElementById('targetEnv').value) || 1000;
        cacheRoom = origMgL ? (totalMl * targetEnv) / origMgL : 0;
        cacheRoomW = totalMl - cacheRoom;
    }

    renderAllResult();
}

function resetAll() {
    document.getElementById('inputVal').value = '';
    document.getElementById('len').value = '';
    document.getElementById('wid').value = '';
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 1000;
    document.getElementById('wallType').value = 'none';
    document.getElementById('wallType').dispatchEvent(new Event('change'));
    document.getElementById('result').innerHTML = '';
    document.getElementById('disinfectObj').value = 'sputum';
    document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

    cacheSputum = cacheSputumW = 0;
    cacheFabric = cacheFabricW = 0;
    cacheTable = cacheTableW = 0;
    cacheClean = cacheCleanW = 0;
    cacheRub = cacheRubW = 0;
    cacheVomit = cacheVomitW = 0;
    cacheFeces = cacheFecesW = 0;
    cacheUrine = cacheUrineW = 0;
    cacheSewage = cacheSewageW = 0;
    cacheBody = cacheBodyW = 0;
    cacheRoom = cacheRoomW = 0;
}
</script>
</body>
</html>
